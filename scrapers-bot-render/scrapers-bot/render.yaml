services:
  - type: worker
    name: scrapers-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        value: https://tqmqdrifrbvupkrufecc.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
      - key: OPERATOR_IDS
        sync: false
      - key: SPREADSHEET_URL
        sync: false
      - key: GOOGLE_CREDS
        sync: false
